<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">NIGHT ESCAPE 1 基本ステージ構成</title>
  <desc id="desc">下中央にPlayerStartと広い警戒エリア、中央に上下2枚の壁、その周囲に通路、壁の間にも通路、上中央に脱出口予定地、右上にハンターと巡回地点A、中央の通路の左端に巡回地点Bを配置した上面図。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .label { font: 700 24px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #111827; }
      .small { font: 500 18px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #374151; }
      .wall-label { font: 700 24px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #ffffff; }
      .point { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .point-text { font: 700 22px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect x="35" y="35" width="890" height="650" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>

  <text class="label" x="385" y="95">脱出口予定地</text>
  <path d="M 480 105 L 480 150" stroke="#374151" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="250" y="165" width="460" height="90" rx="10" fill="#4b5563"/>
  <text class="wall-label" x="440" y="220">上側の壁</text>

  <rect x="250" y="360" width="460" height="90" rx="10" fill="#4b5563"/>
  <text class="wall-label" x="440" y="415">下側の壁</text>

  <rect x="120" y="165" width="110" height="285" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text class="label" x="145" y="252">通路</text>

  <rect x="730" y="165" width="110" height="285" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text class="label" x="755" y="252">通路</text>

  <rect x="230" y="275" width="500" height="70" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text class="label" x="445" y="319">通路</text>

  <rect x="80" y="575" width="800" height="52" rx="24" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text class="label" x="395" y="609">警戒エリア</text>

  <circle cx="480" cy="660" r="16" fill="#2563eb"/>
  <text class="label" x="530" y="668">PlayerStart</text>

  <circle cx="785" cy="115" r="16" fill="#ef4444"/>
  <text class="label" x="815" y="123">H</text>
  <text class="small" x="770" y="150">ハンター</text>

  <circle class="point" cx="735" cy="110" r="16"/>
  <text class="point-text" x="727" y="118">A</text>
  <text class="small" x="690" y="85">PatrolPointA</text>

  <circle class="point" cx="230" cy="310" r="16"/>
  <text class="point-text" x="222" y="318">B</text>
  <text class="small" x="175" y="345">PatrolPointB</text>
</svg>
