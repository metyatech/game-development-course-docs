<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">NIGHT ESCAPE 1 基本ステージ構成</title>
  <desc id="desc">下中央の警戒エリア外にPlayerStart、警戒エリア内に左右2枚の縦長の壁と3本の通路、上側に左右へ巡回するハンター、上中央に脱出口予定地を配置した上面図。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .label { font: 700 24px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #111827; }
      .small { font: 500 18px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #374151; }
      .wall-label { font: 700 24px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #ffffff; }
      .point { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .point-text { font: 700 22px 'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', sans-serif; fill: #111827; }
      .hunter-text { font: 700 22px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect x="35" y="35" width="890" height="650" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="3"/>

  <text class="label" x="385" y="82">脱出口予定地</text>
  <path d="M 480 92 L 480 130" stroke="#374151" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="85" y="145" width="790" height="450" rx="24" fill="#fef3c7" fill-opacity="0.48" stroke="#f59e0b" stroke-width="4"/>
  <text class="label" x="110" y="183">警戒エリア</text>

  <line x1="310" y1="225" x2="650" y2="225" stroke="#94a3b8" stroke-width="6" stroke-dasharray="14 12"/>

  <circle class="point" cx="310" cy="225" r="18"/>
  <text class="point-text" x="310" y="225" text-anchor="middle" dominant-baseline="central">A</text>
  <text class="small" x="245" y="202">PatrolPointA</text>

  <circle cx="480" cy="225" r="20" fill="#ef4444"/>
  <text class="hunter-text" x="480" y="225">H</text>
  <text class="small" x="445" y="265">ハンター</text>

  <circle class="point" cx="650" cy="225" r="18"/>
  <text class="point-text" x="650" y="225" text-anchor="middle" dominant-baseline="central">B</text>
  <text class="small" x="595" y="202">PatrolPointB</text>

  <rect x="245" y="315" width="145" height="235" rx="10" fill="#4b5563"/>
  <text class="wall-label" x="317" y="425" text-anchor="middle">左側の壁</text>

  <rect x="570" y="315" width="145" height="235" rx="10" fill="#4b5563"/>
  <text class="wall-label" x="642" y="425" text-anchor="middle">右側の壁</text>

  <text class="label" x="125" y="440">通路</text>
  <text class="label" x="450" y="440">通路</text>
  <text class="label" x="770" y="440">通路</text>

  <circle cx="480" cy="650" r="17" fill="#2563eb"/>
  <text class="label" x="525" y="658">PlayerStart</text>
</svg>
